<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description"
      content="Contact White Water Rafting for bookings, questions, and support. Reach us by phone, email, or use our contact form." />
    <meta name="author" content="Williams Olisebinum" />
    <title>White Water Rafting | Contact Us</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/rapids-logo.jpeg" alt="Rafting Company Logo" />

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html" class="active">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section class="company-info">
            <h1>Contact Us</h1>
            <h2>White Water Rafting Company</h2>
            <address>
                123 Main River Street<br />
                Kolob, California<br />
                <a href="tel:+19999999999">+1 999 999 9999</a><br />
                <a href="mailto:info@whitewater.com">info@whitewater.com</a>
            </address>
        </section>

        <section class="contact-section">

            <div class="map">
                <iframe src="https://www.google.com/maps/embed" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <form class="contact-form" novalidate>
                <h2>Send Us a Message</h2>

                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your full name" required />

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="your.email@example.com"
                  required />

                <fieldset>
                    <legend>Message Purpose</legend>

                    <div class="radio-group">
                        <label>
                            <input type="radio" name="purpose" value="General Inquiry" checked />
                            General Inquiry
                        </label>

                        <label>
                            <input type="radio" name="purpose" value="Reservation Question" />
                            Reservation Question
                        </label>

                        <label>
                            <input type="radio" name="purpose" value="Website Suggestion" />
                            Website Suggestion
                        </label>
                    </div>
                </fieldset>

                <label for="message">Message:</label>
                <textarea id="message" name="message" placeholder="Type your message here" rows="5"
                  required></textarea>

                <div>
                    <input type="checkbox" id="subscribe" name="subscribe" />
                    <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                </div>

                <button type="submit" class="submit-btn">Get in Touch!</button>
            </form>

        </section>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-list">

                <figure>
                    <img src="images/jane-smith.webp" alt="Jane Smith, Customer Service Manager" />
                    <figcaption>Jane Smith – Customer Service Manager</figcaption>
                </figure>

                <figure>
                    <img src="images/john-doe.jpg" alt="John Doe, Trip Coordinator" />
                    <figcaption>John Doe – Trip Coordinator</figcaption>
                </figure>

                <figure>
                    <img src="images/emily-johnson.jpg" alt="Emily Johnson, Marketing Specialist" />
                    <figcaption>Emily Johnson – Marketing Specialist</figcaption>
                </figure>

            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Company | Ebinum Olise</p>

        <nav class="socialmedia">
            <a href="#"><img src="images/facebook-square.svg" alt="Facebook" /></a>
            <a href="#"><img src="images/linkedin-square.svg" alt="LinkedIn" /></a>
            <a href="#"><img src="images/instagram-square.svg" alt="Instagram" /></a>
        </nav>
    </footer>
</body>

</html>
